name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'yarn'
        
    - run: yarn install --frozen-lockfile
    
    - name: Set environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/enterprise_db?schema=public" >> $GITHUB_ENV
        echo "JWT_ACCESS_SECRET=secret123" >> $GITHUB_ENV
        echo "JWT_REFRESH_SECRET=secret1234" >> $GITHUB_ENV
        
    - run: yarn prisma:generate
    - run: yarn prisma:migrate
    
    - run: yarn lint
    - run: yarn build
    - run: yarn test:coverage
